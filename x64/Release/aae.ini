;####AAE MAIN INI####

[main]
;mame_rom_path=e:\mame\roms
;mame_artwork_path=e:\mame\artwork

screenw=1024
screenh=768

hack=1
bezel=0
artwork=1
artcrop=1
overlay=1
snappng=1
dotmask=0
force_vsync=1
doublebuffer=1
drawzero=0
samplerate=48000
linewidth=2.2
pointsize=1.5
gamma=127
bright=127
contrast=127
translucent=1
accumlevel=0
fire_point_size=20
explode_point_size=17
debug=0
kbleds=1
debug_profile_code=1
audio_force_resample=0
; --- Performance Settings ---
; Process priority: 0=IDLE, 1=NORMAL, 2=ABOVE_NORMAL, 3=HIGH, 4=REALTIME (not recommended)
priority=2
; Boost main game thread priority slightly above normal
; 1 = enable, 0 = disable
boostThread=1
raster_effect=scanlines.png
; Disable confirm_exit to exit without the confirmation for arcade cabinets.
confirm_exit=0
;scanrez2.png
;Flip the GUI controls for cabinets with just right/left controls.
flip_gui_controls=0
system_rotation=0
;########### GAME SPECIFIC HACKS ################
sstick=1
;#########KEY CONFIGS##############

kquit=59
kpause=16
ksnap=58
klstate=53
ksstate=54
ktest=48
kmenu=64

########## Trackball / Spinner  #########

mouse1xs=2
mouse1ys=2
mouse2xs=3
mouse2ys=3
mouse1x_invert=0
mouse1y_invert=0
mouse1b1=41
mouse1b1=42

########## JOYSTICK ###############
;TBD


########### SOUND OPTIONS ###############

hvnoise=0
pshiss=0
psnoise=0


mainvol=255
pokeyvol=255
noisevol=26

###########################
anisfilter=0
prescale=2.0
snappng=0
vectorglow=7
vectortrail=0
gain=20
m_line=23
m_point=13
monitor=0
screenburn=0

widescreen=0
[mouse]
mouse_accel_factor=2

[window]
fullscreen=0
center=1
use_aspect=0
aspect_ratio=4:3
disable_nc=1
disable_rounded_corners=false
width=1024
height=768
dpi_aware=true
cursor_clip=0

